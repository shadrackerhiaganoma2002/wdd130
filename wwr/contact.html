<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="About Us page for Splash White Water Rafting, providing family fun, booking information, and unforgettable rafting adventures.">
    <meta name="author" content="Shadrack Erhiaganoma Ekavana">
    <title>Contact Us - White Water Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/image-logo.png" alt="Splash White Water Rafting Logo" width="80" height="80">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    <div class="wrapper">
        <main>
            <h1>Contact Us</h1>
            <div class="contact-grid">
                <section class="contact-info">
                    <h2>Our Office</h2>
                    <address>
                        123 River Road<br>
                        Rapids City, RC 12345<br>
                        <strong>Phone:</strong> <a href="tel:1234567890">(123) 456-7890</a><br>
                        <strong>Email:</strong> <a href="mailto:info@wwr.com">info@wwr.com</a>
                    </address>
                </section>
                <section class="contact-form">
                    <h2>Send Us a Message</h2>
                    <form action="#" method="post" autocomplete="on">
                        <div class="form-group">
                            <label for="name">Full Name:</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address:</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Message:</label>
                            <textarea id="message" name="message" rows="5" required></textarea>
                        </div>
                        <div class="form-group">
                            <button type="submit">Send Message</button>
                        </div>
                    </form>
                </section>
                <section class="map">
                    <h2>Find Us</h2>
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!" width="100%" height="300"
                        style="border:0;" allowfullscreen="" loading="lazy"
                        title="Google Map of White Water Rafting Office"></iframe>
                </section>
            </div>
        </main>
        <footer>
            <p>&copy; 2025 White Water Rafting. Shadrack Erhiaganoma. All rights reserved.</p>
            <p>
                <a href="https://facebook.com" target="_blank" rel="noopener">Facebook</a> |
                <a href="https://instagram.com" target="_blank" rel="noopener">Instagram</a>
            </p>
        </footer>
    </div>
</body>

</html>
